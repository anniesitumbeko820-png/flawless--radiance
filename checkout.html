<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | Flawless Radiance</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      padding: 20px;
      background: #fff0f5;
    }

    h1 {
      color: #c51c5b;
      margin-bottom: 20px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 15px;
      background: #fff;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    li img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
    }

    li span {
      flex: 1;
      font-weight: 700;
    }

    .total {
      margin-top: 20px;
      font-weight: 800;
      font-size: 18px;
    }

    .btn-purchase {
      background: #c51c5b;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 10px;
    }

    form {
      max-width: 400px;
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    form input,
    form select {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .success-msg {
      color: green;
      font-weight: 700;
      margin-top: 20px;
    }

    a {
      margin-top: 15px;
      display: inline-block;
      color: #c51c5b;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h1 id="checkout-title">Checkout</h1>
  <ul id="checkout-list"></ul>
  <div class="total" id="checkout-total"></div>

  <form id="checkout-form">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>
    <select id="payment" required>
      <option value="">Select Payment Method</option>
      <option value="mobile">Mobile Money</option>
      <option value="card">Card Payment</option>
      <option value="cash">Cash on Delivery</option>
    </select>
    <button type="submit" class="btn-purchase" id="submit-btn">Complete Checkout</button>
  </form>

  <div class="success-msg" id="success-msg"></div>
  <a href="#" id="back-link">Go Back</a>

  <script>
    const checkoutList = document.getElementById('checkout-list');
    const checkoutTotal = document.getElementById('checkout-total');
    const checkoutTitle = document.getElementById('checkout-title');
    const submitBtn = document.getElementById('submit-btn');
    const backLink = document.getElementById('back-link');

    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const booking = JSON.parse(localStorage.getItem('booking')) || null;

    let total = 0;

    // -------------------------
    // DISPLAY PRODUCTS CHECKOUT
    // -------------------------
    if (cart.length > 0) {
      checkoutTitle.textContent = "Product Checkout";
      backLink.href = "cart.html";
      submitBtn.textContent = "Complete Purchase";

      cart.forEach(item => {
        const li = document.createElement('li');
        li.innerHTML = `
          <img src="${item.image}" alt="${item.name}">
          <span>${item.name}</span>
          <span>Qty: ${item.quantity}</span>
          <span>K${(item.price * item.quantity).toFixed(2)}</span>
        `;
        checkoutList.appendChild(li);
        total += item.price * item.quantity;
      });

      checkoutTotal.textContent = "Total: K" + total.toFixed(2);
    }

    // -------------------------
    // DISPLAY BOOKING CHECKOUT WITH DYNAMIC IMAGE
    // -------------------------
    else if (booking) {
      checkoutTitle.textContent = "Booking Checkout";
      backLink.href = "services.html";
      submitBtn.textContent = "Confirm Booking";

      const li = document.createElement('li');
      li.innerHTML = `
        <img src="${booking.serviceImage || 'images/service.jpg'}" alt="${booking.service}">
        <span>${booking.service}</span>
        <span>${booking.option || ''}</span>
        <span>${booking.date} at ${booking.time}</span>
      `;
      checkoutList.appendChild(li);
      checkoutTotal.textContent = "Service Booking";
    }

    // -------------------------
    // FORM SUBMIT
    // -------------------------
    document.getElementById('checkout-form').addEventListener('submit', e => {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;

      if (booking) {
        alert(`Booking confirmed!\nName: ${name}\nEmail: ${email}\nPhone: ${phone}\nService: ${booking.service}\nDate: ${booking.date} at ${booking.time}\nImage: ${booking.serviceImage || 'No Image'}`);
      }

      if (cart.length > 0) {
        localStorage.removeItem('cart');
        checkoutList.innerHTML = "";
        checkoutTotal.textContent = "";
        document.getElementById('success-msg').textContent = `Thank you ${name}! Your purchase was successful 💖`;
      }

      if (booking) {
        localStorage.removeItem('booking');
        checkoutList.innerHTML = "";
        checkoutTotal.textContent = "";
        document.getElementById('success-msg').textContent = `Thank you ${name}! Your booking has been confirmed 🌸`;
      }

      e.target.reset();
    });
  </script>

</body>
</html>
