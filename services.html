<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flawless Radiance - Services</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(to right, #ffd6e8, #ffb3d1);
      color: #333;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(5px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav a {
      text-decoration: none;
      font-weight: 600;
      color: #a8005a;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ff007f;
    }

    .section-header {
      text-align: center;
      margin: 50px 0 30px;
    }

    .section-header h2 {
      font-size: 2rem;
      color: #a8005a;
      margin-bottom: 10px;
    }

    .section-header p {
      font-size: 1.1rem;
      color: #444;
      max-width: 600px;
      margin: 0 auto;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
      padding: 0 40px 50px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .card h3 {
      color: #a8005a;
      margin: 15px 0 8px;
    }

    .card p {
      padding: 0 15px 20px;
    }

    .card button {
      background: #ff4d94;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .card button:hover {
      opacity: 0.9;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #a8005a;
      background: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>

  <nav>
    <a href="homepage2.html">Home</a>
    <a href="product.html">Products</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="bookingform.html">Book</a>
  </nav>

  <section>
    <div class="section-header">
      <h2>Our Services</h2>
      <p>Premium services to keep your skin smooth, healthy, and glowing.</p>
    </div>

    <div class="grid-container" id="services-container"></div>
  </section>

  <footer>© 2025 Flawless Radiance. All Rights Reserved.</footer>

  <script>
    const services = [
      {
        name: "Underarm Waxing",
        desc: "Removes unwanted underarm hair, leaving your skin soft and fresh.",
        image: "images/underarm.jpg"
      },
      {
        name: "Bikini Waxing",
        desc: "Gentle bikini waxing ideal for sensitive skin.",
        image: "images/bikin.jpg"
      },
      {
        name: "Leg Waxing",
        desc: "Full or half leg waxing for ultra-smooth skin.",
        image: "images/leg.jpg"
      },
      {
        name: "Facial Waxing",
        desc: "Perfect for brows, upper lip, and chin.",
        image: "images/facial.jpg"
      },
      {
        name: "Exfoliating Scrub",
        desc: "Removes dead skin cells and boosts glow.",
        image: "images/exfiolating.jpg"
      }
    ];

    const container = document.getElementById('services-container');

    services.forEach(service => {
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <img src="${service.image}" alt="${service.name}">
        <h3>${service.name}</h3>
        <p>${service.desc}</p>
        <button>Book Now</button>
      `;

      card.querySelector('button').addEventListener('click', () => {
        localStorage.setItem('selectedService', JSON.stringify(service));
        window.location.href = 'bookingform.html';
      });

      container.appendChild(card);
    });
  </script>

</body>
</html>
